site_name: SentinelFlux
site_description: Production-grade Python test automation framework
site_url: https://sentinelflux.github.io/sentinelflux
repo_url: https://github.com/sentinelflux/sentinelflux
repo_name: sentinelflux/sentinelflux
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - CLI Reference: getting-started/cli.md
  - Guides:
    - Web Testing: guides/web-testing.md
    - API Testing: guides/api-testing.md
    - Self-Healing: guides/self-healing.md
    - AI Test Generation: guides/ai-generation.md
    - Step Tracking: guides/step-tracking.md
    - Failure Artifacts: guides/failure-artifacts.md
  - Examples:
    - OrangeHRM: products/orangehrm.md
  - Reference:
    - Configuration: reference/configuration.md
    - Environment Profiles: reference/environments.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/sentinelflux/sentinelflux
