# API Specifications and Endpoints
# Used by AI for generating API tests and documentation

rest_api:
  base_url: "https://restful-booker-api.herokuapp.com"
  version: "1.0"
  
  endpoints:
    - name: "Create Booking"
      path: "/booking"
      method: POST
      description: "Create a new booking record"
      authentication: "required"
      request_body:
        type: "application/json"
        schema: "booking_schema.json"
        required_fields:
          - firstname
          - lastname
          - totalprice
          - depositpaid
          - bookingdates
        optional_fields:
          - additionalneeds
      response:
        success_codes: [200, 201]
        body: "{ bookingid: integer, booking: {...} }"
      error_scenarios:
        - code: 400
          description: "Missing required fields or invalid data types"
          example: "{ error: 'firstname is required' }"
        - code: 422
          description: "Invalid date format or business rule violation"
          example: "{ error: 'checkout must be after checkin' }"
      negative_cases:
        - "Missing firstname field"
        - "totalPrice as string instead of number"
        - "depositpaid as non-boolean"
        - "Invalid date format (DD/MM/YYYY instead of YYYY-MM-DD)"
        - "Checkin date after checkout date"
        - "Historical dates (past)"
        
    - name: "Get Booking"
      path: "/booking/{id}"
      method: GET
      description: "Retrieve a booking by ID"
      authentication: "optional"
      path_parameters:
        id:
          type: "integer"
          description: "Booking ID"
          required: true
      response:
        success_codes: [200]
        body: "booking_schema.json"
      error_scenarios:
        - code: 404
          description: "Booking not found"
        - code: 400
          description: "Invalid booking ID format"
      negative_cases:
        - "Non-existing booking ID"
        - "Negative booking ID"
        - "Alphabetic characters as ID"
        - "Very large ID number"
        
    - name: "Update Booking"
      path: "/booking/{id}"
      method: PUT
      description: "Update an existing booking"
      authentication: "required"
      path_parameters:
        id:
          type: "integer"
          required: true
      request_body:
        type: "application/json"
        schema: "booking_schema.json"
        optional_fields: ["firstname", "lastname", "totalprice", "depositpaid", "additionalneeds", "bookingdates"]
      response:
        success_codes: [200]
      error_scenarios:
        - code: 404
          description: "Booking not found"
        - code: 400
          description: "Invalid data in request body"
      negative_cases:
        - "Update non-existing booking"
        - "Invalid data types in partial update"
        - "Partial update with invalid dates"
        
    - name: "Delete Booking"
      path: "/booking/{id}"
      method: DELETE
      description: "Delete a booking"
      authentication: "required"
      response:
        success_codes: [201, 204]
      error_scenarios:
        - code: 404
          description: "Booking not found"

graphql_api:
  endpoint: "/graphql"
  type: "GraphQL"
  
  queries:
    - name: "countries_list"
      description: "Query list of countries"
      variables:
        code:
          type: "String"
          required: false
          description: "ISO country code"
      response:
        type: "{ country: { code: String, name: String } }"
      positive_cases:
        - "Query with valid country code 'US'"
        - "Query returning multiple countries"
      negative_cases:
        - "Query with non-existing country code"
        - "Missing required variable"
        - "Invalid variable type"
      validation_rules:
        - "Response contains code and name fields"
        - "Code is ISO 3166-1 alpha-2 format"

validation_rules:
  date_format: "YYYY-MM-DD"
  price_format: "Positive integer or decimal"
  name_format: "Alphanumeric and spaces, 1-100 characters"
