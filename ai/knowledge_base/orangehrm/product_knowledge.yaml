product:
  name: "OrangeHRM Open Source"
  description: "Human Resource Management System for employee lifecycle management"
  version: "5.x"

modules:
  - name: "Authentication"
    description: "Login, logout, session management, password policies"
    status: active
    business_rules:
      - "Username is case-sensitive"
      - "Account locks after 5 consecutive failed login attempts (if configured)"
      - "Session expires after configured inactivity timeout"
      - "Password must meet complexity: min 8 chars, uppercase, lowercase, number, special char"
      - "Admin cannot delete their own account"
    test_scenarios:
      - "Valid admin login redirects to dashboard"
      - "Valid ESS login shows restricted navigation"
      - "Invalid credentials show generic error (no username enumeration)"
      - "Locked account shows appropriate message"

  - name: "PIM (Personnel Information Management)"
    description: "Complete employee record management including personal, job, and contact details"
    status: active
    add_employee_form_fields_only:
      - "First Name (required, max 30 chars)"
      - "Middle Name (optional, max 30 chars)"
      - "Last Name (required, max 30 chars)"
      - "Employee ID (optional, auto-generated, max 10 chars, must be unique)"
    add_employee_form_note: >
      The Add Employee form (/pim/addEmployee) contains ONLY the four fields listed above.
      Date of Birth, Gender, Department, Job Title, Contact Details, and all other fields
      appear on separate tabs within the employee profile AFTER the record is created.
      Do NOT include those fields in Add Employee test cases.
    business_rules:
      - "First Name is required on Add Employee form (1-30 chars)"
      - "Last Name is required on Add Employee form (1-30 chars)"
      - "Middle Name is optional on Add Employee form (max 30 chars)"
      - "Employee ID must be unique across the system"
      - "Employee ID is auto-generated if not provided on Add Employee form"
      - "ESS users can only view and edit their own profile (My Info)"
      - "Admin can view and edit all employee records"
      - "Supervisor can view direct reports"
      - "Terminated employees are hidden from active lists by default"
      - "Date of birth (profile tab only, not on Add form): format YYYY-MM-DD"
      - "Driver's license expiry (profile tab only, not on Add form): must be in future"
    test_scenarios:
      - "Create employee with minimum required fields"
      - "Create employee with all fields"
      - "Search employee by name (partial match)"
      - "Search employee by ID (exact match)"
      - "Edit employee personal details"
      - "Upload employee profile picture (JPEG/PNG max 1MB)"
      - "Delete employee shows confirmation dialog"
      - "ESS user cannot access other employee records (403)"

  - name: "Leave Management"
    description: "Leave types, entitlements, requests, approval workflow"
    status: active
    business_rules:
      - "Leave request dates cannot be in the past (configurable)"
      - "To date must be on or after from date"
      - "Leave cannot be taken on non-working days (weekends if configured)"
      - "Leave balance must be sufficient for requested duration"
      - "Leave request must have a valid leave type"
      - "Approved leave can be cancelled by employee before start date"
      - "Admin/Supervisor can approve, reject, or cancel leave"
      - "Half-day leave is allowed if configured for leave type"
      - "Leave entitlement resets at leave period start"
    test_scenarios:
      - "Employee applies for leave within entitlement"
      - "Leave request with insufficient balance is rejected"
      - "Leave on weekend is rejected (if weekends excluded)"
      - "Supervisor approves pending leave request"
      - "Employee cancels approved leave"

  - name: "Admin - User Management"
    description: "System user accounts, roles, and access control"
    status: active
    business_rules:
      - "Only Admin role can create/edit/delete system users"
      - "Username must be unique (3-40 chars)"
      - "Password complexity: min 8 chars, uppercase, lowercase, number, special char"
      - "Each system user must be linked to an employee record"
      - "Admin cannot change own role to ESS"
      - "Disabled users cannot log in"
      - "User roles: Admin (full access), ESS (self-service only)"
    test_scenarios:
      - "Admin creates new ESS user with valid data"
      - "Admin creates new Admin user"
      - "Duplicate username rejected"
      - "Weak password rejected (< 8 chars, no special char)"
      - "ESS user cannot access user management (403)"
      - "Disabled user login attempt shows error"

personas:
  - name: "System Admin"
    role: "Admin"
    access_level: 1
    description: "Full system access - manages users, configuration, all employee data"
    features_available:
      - "All modules"
      - "User management"
      - "System configuration"
      - "Data purge and maintenance"
    restrictions: []
    test_scenarios:
      - "Can access all navigation menu items"
      - "Can create/edit/delete any employee"
      - "Can approve/reject any leave request"
      - "Can create other admin and ESS users"

  - name: "ESS User"
    role: "ESS (Employee Self Service)"
    access_level: 2
    description: "Limited access - can only view/edit own profile, apply for leave, view own timesheets"
    features_available:
      - "My Info (own profile)"
      - "Apply for leave"
      - "View own leave balance"
      - "View own timesheet"
      - "View employee directory"
    restrictions:
      - "Cannot view other employee personal details"
      - "Cannot create/delete employees"
      - "Cannot manage system users"
      - "Cannot access Admin, Maintenance modules"
    test_scenarios:
      - "ESS user can update own personal details"
      - "ESS user cannot access /admin URLs (redirected or 403)"
      - "ESS user can apply for leave"
      - "ESS user cannot approve leave"

  - name: "Supervisor"
    role: "ESS with supervisor assignment"
    access_level: 2
    description: "ESS user assigned as supervisor for direct reports - can approve their leave/timesheets"
    features_available:
      - "All ESS features"
      - "Approve/reject direct reports' leave"
      - "View direct reports' timesheets"
    restrictions:
      - "Cannot access employees outside own reporting chain"

validation_rules:
  employee_firstname:
    required: true
    type: string
    min_length: 1
    max_length: 30
    pattern: "alphanumeric and spaces, hyphens, apostrophes"
  employee_lastname:
    required: true
    type: string
    min_length: 1
    max_length: 30
  employee_id:
    required: false
    type: string
    max_length: 10
    unique: true
    auto_generated: true
  username:
    required: true
    type: string
    min_length: 5
    max_length: 40
    unique: true
    pattern: "alphanumeric and underscores only"
  password:
    required: true
    min_length: 8
    rules:
      - "At least one uppercase letter"
      - "At least one lowercase letter"
      - "At least one number"
      - "At least one special character"

known_issues:
  - description: "Session cookie not marked HttpOnly in some configurations"
    severity: medium
    test_hint: "Check response headers for Set-Cookie: HttpOnly flag"
  - description: "IDOR possible if empNumber is guessable — ESS users may access other records via direct URL"
    severity: high
    test_hint: "ESS user accessing /pim/employees/{other_empNumber} should return 403"
  - description: "Username enumeration possible via login error message timing difference"
    severity: low
    test_hint: "Time login responses for valid vs invalid usernames"

edge_cases:
  - "Employee with same first and last name as existing employee — should create with different empNumber"
  - "Leave request spanning year boundary"
  - "Employee with 100-char name combinations at boundaries"
  - "Search with empty string returns all records"
  - "Pagination: navigating to last page with correct record count"
