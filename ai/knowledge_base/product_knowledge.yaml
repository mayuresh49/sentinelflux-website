# Product Knowledge Base
# Defines the business logic, features, personas, and rules of the product
# Used by AI for generating meaningful test cases based on actual product behavior

product:
  name: "SentinelFlux"
  description: "Comprehensive test automation and booking management platform"
  version: "1.0.0"

## MODULES AND FEATURES

modules:
  
  - name: "Booking Management"
    description: "Core module for managing guest bookings"
    version: "1.0.0"
    enabled_by_default: true
    status: "production"
    
    sub_modules:
      - name: "Create Booking"
        description: "Create new guest booking"
        enabled_by_default: true
        
      - name: "View Booking"
        description: "View existing booking details"
        enabled_by_default: true
        
      - name: "Modify Booking"
        description: "Update booking information"
        enabled_by_default: true
        depends_on: ["View Booking"]
        
      - name: "Cancel Booking"
        description: "Cancel or delete a booking"
        enabled_by_default: true
        depends_on: ["View Booking"]
    
    business_rules:
      - "Check-out date must be after check-in date"
      - "Booking price must be between 0 and 10000"
      - "Guest first name and last name are mandatory"
      - "Deposit can be optional"
      - "Maximum stay duration is 365 days"
      - "Bookings cannot be created for past dates"
      - "Additional needs field is optional and limited to 500 characters"
    
    validation_rules:
      firstname:
        required: true
        type: "string"
        min_length: 1
        max_length: 100
        pattern: "alphanumeric and spaces"
      
      lastname:
        required: true
        type: "string"
        min_length: 1
        max_length: 100
        pattern: "alphanumeric and spaces"
      
      totalprice:
        required: true
        type: "number"
        min_value: 0
        max_value: 10000
        decimal_places: 2
      
      depositpaid:
        required: true
        type: "boolean"
      
      additionalneeds:
        required: false
        type: "string"
        max_length: 500
      
      bookingdates:
        required: true
        type: "object"
        checkin:
          required: true
          format: "YYYY-MM-DD"
          constraint: "Must be before checkout"
        checkout:
          required: true
          format: "YYYY-MM-DD"
          constraint: "Must be after checkin"

  - name: "Localization"
    description: "Multi-language support for the platform"
    version: "1.0.0"
    enabled_by_default: true
    status: "beta"
    
    supported_locales:
      - code: "en-US"
        name: "English (United States)"
        default: true
      - code: "de-DE"
        name: "German (Germany)"
      - code: "fr-FR"
        name: "French (France)"
      - code: "es-ES"
        name: "Spanish (Spain)"
    
    business_rules:
      - "Locale can be set per user session"
      - "Locale affects form labels and error messages"
      - "Date format changes based on locale"

## USER PERSONAS AND ACCESS CONTROL

personas:
  
  - name: "Guest"
    description: "Non-authenticated visitor"
    access_level: 1
    features_available:
      - "View public booking form"
      - "Submit booking"
      - "View own booking (if provided confirmation ID)"
    
    restrictions:
      - "Cannot view other bookings"
      - "Cannot modify bookings"
      - "Cannot access admin panel"
    
    test_scenarios:
      - "Create booking without authentication"
      - "View booking with confirmation ID"
      - "Cannot view booking without confirmation ID"
  
  - name: "Authenticated User"
    description: "Logged-in user with account"
    access_level: 2
    features_available:
      - "All Guest features"
      - "View booking history"
      - "Modify own bookings"
      - "Manage account settings"
    
    restrictions:
      - "Cannot view other users' bookings"
      - "Cannot create admin users"
      - "Cannot access analytics"
    
    test_scenarios:
      - "Create multiple bookings"
      - "Modify own booking"
      - "View booking history"
      - "Cannot modify other users' bookings"
  
  - name: "Moderator"
    description: "Platform moderator with elevated privileges"
    access_level: 3
    features_available:
      - "All Authenticated User features"
      - "View all bookings"
      - "Manage user accounts"
      - "Flag inappropriate bookings"
      - "View analytics dashboard"
    
    restrictions:
      - "Cannot delete admin users"
      - "Cannot change system settings"
    
    test_scenarios:
      - "View any booking"
      - "Flag booking for review"
      - "View platform analytics"
  
  - name: "Administrator"
    description: "Full platform access"
    access_level: 4
    features_available:
      - "All features"
      - "System configuration"
      - "User management"
      - "Feature toggles"
      - "Generate reports"
    
    restrictions: []
    
    test_scenarios:
      - "Enable/disable modules"
      - "Manage users"
      - "System configuration"
      - "Generate reports"

## FEATURE FLAGS AND SETTINGS

feature_flags:
  
  - name: "enhanced_validation"
    description: "Enable enhanced booking validation rules"
    default: true
    change_requires_restart: false
    personas_can_toggle: ["Administrator"]
    impact: "booking_validation"
    test_scenarios:
      - "Submit booking with invalid email (enabled)"
      - "Submit booking with invalid email (disabled)"
  
  - name: "multi_language_support"
    description: "Enable multi-language interface"
    default: true
    change_requires_restart: false
    personas_can_toggle: ["Administrator"]
    impact: "localization"
    test_scenarios:
      - "Switch language to German"
      - "Switch language to French"
      - "Verify form labels in each language"

account_settings:
  - name: "Default Locale"
    type: "string"
    default_value: "en-US"
    allowed_values: ["en-US", "de-DE", "fr-FR", "es-ES"]
    persona_can_change: ["Authenticated User", "Administrator"]
  
  - name: "Email Notifications"
    type: "boolean"
    default_value: true
    persona_can_change: ["Authenticated User", "Administrator"]
  
  - name: "Two-Factor Authentication"
    type: "boolean"
    default_value: false
    persona_can_change: ["Authenticated User", "Administrator"]

## USE CASES AND SCENARIOS

use_cases:
  
  - name: "Simple Booking"
    description: "Guest creates a basic booking with minimum required information"
    actors: ["Guest"]
    preconditions:
      - "Guest is on booking form page"
    steps:
      - "Enter first name"
      - "Enter last name"
      - "Enter total price"
      - "Select deposit paid status"
      - "Select check-in date"
      - "Select check-out date"
      - "Click submit"
    expected_result: "Booking is created successfully"
    test_scenarios:
      - "Happy path with valid data"
      - "Missing required field"
      - "Invalid date format"
      - "Checkout before checkin"
  
  - name: "Modify Booking"
    description: "Authenticated user modifies an existing booking"
    actors: ["Authenticated User"]
    preconditions:
      - "User is logged in"
      - "User has existing booking"
    steps:
      - "Navigate to booking history"
      - "Select booking to modify"
      - "Update booking fields"
      - "Click save"
    expected_result: "Booking is updated and changes are persisted"
    test_scenarios:
      - "Update price to valid value"
      - "Update price above maximum"
      - "Extend stay by modifying checkout date"
      - "Cannot modify cancelled booking"
  
  - name: "View Booking History"
    description: "Authenticated user views all their bookings"
    actors: ["Authenticated User"]
    preconditions:
      - "User is logged in"
      - "User has multiple bookings"
    steps:
      - "Navigate to booking history"
    expected_result: "All user bookings are displayed with details"
    test_scenarios:
      - "Display bookings in chronological order"
      - "Filter by status (active, cancelled, completed)"
      - "Search bookings by date range"
  
  - name: "Admin Feature Toggle"
    description: "Administrator enables/disables product features"
    actors: ["Administrator"]
    preconditions:
      - "User is logged in as admin"
    steps:
      - "Navigate to system settings"
      - "Find feature flag"
      - "Toggle feature on/off"
      - "Save settings"
    expected_result: "Feature flag is updated, system behaves according to flag"
    test_scenarios:
      - "Toggle enhanced_validation off"
      - "Verify booking accepts invalid data when flag is off"
      - "Toggle enhanced_validation on"
      - "Verify booking rejects invalid data when flag is on"

## INTEGRATION POINTS

integrations:
  
  - name: "Email Notification Service"
    description: "Sends booking confirmation emails"
    trigger_events:
      - "booking_created"
      - "booking_modified"
      - "booking_cancelled"
    test_scenarios:
      - "Email sent on booking creation"
      - "Email contains correct booking details"
      - "Email language matches user locale"
  
  - name: "Payment Gateway"
    description: "Processes payments for deposits"
    trigger_events:
      - "booking_created_with_deposit"
    business_rules:
      - "Payment must succeed before booking is confirmed"
      - "Failed payment blocks booking creation"
    test_scenarios:
      - "Successful payment completes booking"
      - "Failed payment cancels booking"

## EDGE CASES AND CONSTRAINTS

edge_cases:
  
  - scenario: "Leap year date handling"
    description: "System correctly handles Feb 29 in leap years"
    test_data:
      checkin: "2024-02-28"
      checkout: "2024-02-29"
    expected_behavior: "Booking should be created successfully"
  
  - scenario: "Year boundary crossing"
    description: "Booking spanning calendar year (e.g., Dec 30 - Jan 5)"
    test_data:
      checkin: "2025-12-30"
      checkout: "2026-01-05"
    expected_behavior: "Booking duration calculated correctly across year"
  
  - scenario: "Maximum stay duration"
    description: "System validates maximum 365-day stay"
    test_data:
      checkin: "2025-01-01"
      checkout: "2026-01-01"
    expected_behavior: "Booking rejected (365+ days)"
  
  - scenario: "Price boundary values"
    description: "System handles edge price values"
    test_cases:
      - price: 0
        expected: "Accepted"
      - price: 0.01
        expected: "Accepted"
      - price: 10000
        expected: "Accepted"
      - price: 10000.01
        expected: "Rejected"
      - price: -1
        expected: "Rejected"

## KNOWN ISSUES AND LIMITATIONS

known_issues:
  
  - issue: "API accepts historical dates"
    severity: "low"
    workaround: "Validate dates on client-side"
    planned_fix: "Q3 2026"
  
  - issue: "additionalneeds field not sanitized"
    severity: "medium"
    workaround: "Admin review of bookings"
    planned_fix: "Q2 2026"
  
  - issue: "No timezone support"
    severity: "medium"
    scope: "All date operations"
    planned_fix: "Q4 2026"
