# UI Pages and Web Application Specifications
# Used by AI for generating web UI tests and documentation

pages:
  - name: "Test Form Page"
    url: "https://automationintesting.com/selenium/testpage/"
    description: "Main test form with various input types for form validation testing"
    
    forms:
      - name: "Booking Form"
        id: "bookingForm"
        fields:
          - name: "firstname"
            type: "text input"
            label: "First Name"
            required: true
            max_length: 100
            locators:
              primary: "input#firstname"
              alternative: "input[name='firstname']"
            validation:
              - "Must not be empty"
              - "Max 100 characters"
          
          - name: "lastname"
            type: "text input"
            label: "Surname"
            required: true
            max_length: 100
            locators:
              primary: "input#lastname"
              alternative: "input[name='lastname']"
            validation:
              - "Must not be empty"
              - "Max 100 characters"
          
          - name: "email"
            type: "email input"
            label: "Email"
            required: true
            locators:
              primary: "input#email"
              alternative: "input[type='email']"
            validation:
              - "Valid email format"
          
          - name: "phone"
            type: "tel input"
            label: "Phone"
            required: false
            locators:
              primary: "input#phone"
              alternative: "input[type='tel']"
          
          - name: "subject"
            type: "text input"
            label: "Subject"
            required: false
            max_length: 100
            locators:
              primary: "input#subject"
          
          - name: "description"
            type: "textarea"
            label: "Description"
            required: false
            max_length: 500
            locators:
              primary: "textarea#description"
              alternative: "textarea[name='description']"
          
          - name: "datepicker"
            type: "date picker"
            label: "Date of Birth"
            required: false
            locators:
              primary: "input#datepicker"
              alternative: "[data-testid='date-picker']"
            validation:
              - "Valid date format"
              - "Not future date"

    buttons:
      - name: "Submit"
        id: "submitButton"
        type: "submit"
        locators:
          primary: "button#submitButton"
          alternative: "button[type='submit']"
        behavior: "Submits form when clicked"
      
      - name: "Reset"
        id: "resetButton"
        type: "reset"
        locators:
          primary: "button#resetButton"
          alternative: "button[type='reset']"
        behavior: "Clears all form fields"

    test_scenarios:
      positive:
        - "Fill all required fields and submit"
        - "Fill required + some optional fields and submit"
        - "Clear form using reset button"
      
      negative:
        - "Submit without firstname"
        - "Submit without lastname"
        - "Submit with invalid email format"
        - "Submit with email as numeric value"
        - "Enter text exceeding max_length"
      
      edge_cases:
        - "Fill firstname with exactly 100 characters"
        - "Fill firstname with 101 characters (should fail)"
        - "Submit with only whitespace in required field"
        - "Submit with special characters in name fields"
        - "Very long description (approaching 500 char limit)"

user_workflows:
  - name: "Basic Form Submission"
    steps:
      - "Navigate to form page"
      - "Enter first name"
      - "Enter last name"
      - "Enter email"
      - "Click submit"
    expected_result: "Form submitted successfully"
    error_handling: "Display validation error messages"

accessibility:
  - "Form has proper labels for all fields"
  - "Tab order follows logical flow"
  - "Error messages are announced to screen readers"
  - "Form submission can be triggered with keyboard"
