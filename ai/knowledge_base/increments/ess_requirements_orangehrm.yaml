product: orangehrm
feature: employee_self_service_orangehrm
domain: web
description: |
  The Employee Self-Service (ESS) module of OrangeHRM allows employees to manage their own HR-related information and transactions through a secure, role-based interface. This includes viewing and updating personal records, managing leave applications and approvals, tracking time and attendance, submitting claims for reimbursement, participating in performance reviews, accessing training and skills development resources, and reviewing payroll and compensation details.

scenarios:
  - name: login
    type: happy_path
    description: Verify successful user login with valid credentials.
  
  - name: profile_view
    type: happy_path
    description: Ensure employees can view their personal records without errors.
  
  - name: leave_application
    type: happy_path
    description: Test the process of submitting a leave application and receiving approval notifications.
  
  - name: time_punch_in_out
    type: happy_path
    description: Validate that time punch-in and out actions complete within expected time frames.
  
  - name: claim_submission
    type: happy_path
    description: Verify the submission of expense claims and subsequent reimbursement process.
  
  - name: performance_review_participation
    type: happy_path
    description: Ensure employees can access and provide input on their performance reviews.
  
  - name: training_enrollment
    type: happy_path
    description: Test the enrollment in training programs and tracking of attendance and completion status.
  
  - name: payroll_view
    type: happy_path
    description: Validate that employees can view their payroll summaries accurately and promptly.
  
  - name: document_access
    type: happy_path
    description: Ensure access to payslips, tax forms, and other relevant documents is secure and accessible.
  
  - name: dashboard_notifications
    type: happy_path
    description: Test the display of real-time notifications and dashboards for upcoming tasks and updates.