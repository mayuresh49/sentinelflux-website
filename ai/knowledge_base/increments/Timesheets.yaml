feature: timesheet_submission
domain: api
description: |
  Automate testing of OrangeHRM's Time module, focusing on the API endpoints related to timesheet submission, approval, rejection, and resetting. This includes validating the creation, editing, submission, approval/rejection, view by period, and reset functionality for weekly timesheets.

endpoints:
  - name: Create Timesheet
    path: /employees/{employee_id}/timesheets
    method: POST
    description: Creates a new timesheet for an employee
    auth_required: true
    request_body:
      emplyee_id: integer
      weeks: array of objects with properties "start_date" and "end_date"
      rows: array of objects with properties "project", "activity", and "hours_per_day"

  - name: Submit Timesheet
    path: /employees/{employee_id}/timesheets/{timesheet_id}/submit
    method: PUT
    description: Submits an existing timesheet for approval
    auth_required: true
    request_body: {}

  - name: Approve Timesheet
    path: /approvals/{approval_id}/approve
    method: PUT
    description: Approves a submitted timesheet
    auth_required: true
    request_body: {}

  - name: Reject Timesheet with Comment
    path: /approvals/{approval_id}/reject
    method: PUT
    description: Rejects a submitted timesheet with a comment
    auth_required: true
    request_body:
      comment: string

  - name: Reset Saved Timesheet
    path: /employees/{employee_id}/timesheets/{timesheet_id}/reset
    method: DELETE
    description: Resets a saved timesheet to the initial state
    auth_required: true
    request_body: {}

response_codes: [200, 400, 401, 404]

scenarios:
  - name: ESS submits a valid 40-hour timesheet
    type: happy_path
    description: |
      As an ESS employee, I want to submit a valid weekly timesheet with 40 hours. The system should accept the submission and update the status of the timesheet accordingly.

  - name: Supervisor approves a valid timesheet
    type: happy_path
    description: |
      As a supervisor, I want to approve a valid weekly timesheet with 40 hours. The system should allow me to approve the timesheet and update its status accordingly.

  - name: Supervisor rejects a valid timesheet with comment
    type: error
    description: |
      As a supervisor, I want to reject a valid weekly timesheet with a comment. The system should not accept the submission without a valid reason and return an appropriate error message.

  - name: ESS resets a saved timesheet
    type: happy_path
    description: |
      As an ESS employee, I want to reset a saved weekly timesheet. The system should clear all hours and update the status of the timesheet accordingly.