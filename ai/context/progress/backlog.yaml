- id: D-06
  phase: debt
  title: "Wire non-Mistral providers to agent analysis in runs router"
  file: dashboard/routers/runs.py (_build_ai_client)
  priority: medium
  status: todo
  notes: >
    _build_ai_client() only handles Ollama provider from chat_config.json.
    If user configures OpenAI/Anthropic/Gemini in the chat widget, failure
