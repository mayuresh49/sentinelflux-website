# --- Technical Debt (blocking at scale) ---

- id: D-01
  phase: debt
  title: "File locking on all JSON/YAML data writers"
  files:
    - utils/activity_log.py
    - utils/approval_manager.py
    - utils/run_manager.py
    - dashboard/routers/pipeline.py
  priority: high
  status: todo
  notes: >
    All writers do read-modify-write without locks. Concurrent pytest-xdist runs
    + dashboard triggers will corrupt data/ files.
    Use filelock.FileLock wrapping each _save() / _write() call.
    Add filelock to requirements.txt.

- id: D-02
  phase: debt
  title: "Cap run_history.yaml with rolling 90-day window"
  file: ai/agents/quarantine_manager.py
  priority: high
  status: todo
  notes: >
    run_history.yaml grows unbounded. FlakyDetectorAgent reads the whole file.
    With 100+ tests × 30 runs/day this gets slow in weeks.
    Add trim logic in QuarantineManager.record_run() — drop entries older than 90 days.

- id: D-03
  phase: debt
  title: "Centralize ROOT_DIR into utils/paths.py"
  files: "11 files each computing Path(__file__).resolve().parent.parent[.parent]"
  priority: medium
  status: todo
  notes: >
    ROOT_DIR, _ROOT_DIR, _ROOT, PROJECT_ROOT, BASE_DIR — all computing the same
    root path independently with inconsistent naming and depth.
    Create utils/paths.py with ROOT = Path(__file__).resolve().parent.parent
    and import it everywhere. Prevents silent wrong-directory bugs.

- id: D-04
  phase: debt
  title: "Split config_router.py into sub-modules"
  file: dashboard/routers/config_router.py
  priority: medium
  status: todo
  notes: >
    908 lines handling env configs, users, assignments, labels, priorities,
    products, generation categories. Extract into dashboard/routers/config/
    subpackage: users.py, env.py, assignments.py, labels.py.
    Register each sub-router in app.py under /api/config prefix.

- id: D-05
  phase: debt
  title: "Unit tests for core framework utilities"
  files:
    - utils/activity_log.py
    - utils/approval_manager.py
    - utils/run_manager.py
    - ai/knowledge_base/kb_loader.py
  priority: medium
  status: todo
  notes: >
    Zero unit tests for any of these. All are pure-logic classes safe to test
