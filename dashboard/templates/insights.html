{% extends "base.html" %}
{% block title %}Product Insights{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto space-y-6" x-data="insightsPage()" x-init="init()">

  <!-- Header -->
  <div class="flex items-center justify-between flex-wrap gap-3">
    <div>
      <h1 class="text-2xl font-bold text-slate-900">Product Insights</h1>
      <p class="text-sm text-slate-500 mt-0.5">AI-driven expert review of SentinelFlux across 4 perspectives</p>
    </div>
    <div class="flex items-center gap-2">
      <span class="bg-indigo-100 text-indigo-700 text-xs font-semibold px-2.5 py-1 rounded-full">Master Admin</span>
    </div>
  </div>

  <!-- Persona tab selector -->
  <div class="flex gap-2 flex-wrap">
    <template x-for="persona in personas" :key="persona.key">
      <button @click="activeTab = persona.key; statusFilter = 'active'"
              :class="activeTab === persona.key
                ? 'bg-indigo-600 text-white shadow-sm ring-1 ring-indigo-500'
                : 'bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 hover:border-slate-300'"
              class="flex items-center gap-2 px-4 py-2.5 rounded-xl text-sm font-medium transition-all">
        <span x-text="persona.icon" class="text-base leading-none"></span>
        <span x-text="persona.label"></span>
        <span x-show="activeCount(persona.key) > 0"
              :class="activeTab === persona.key ? 'bg-white/25 text-white' : 'bg-indigo-100 text-indigo-700'"
              class="text-xs px-1.5 py-0.5 rounded-full font-bold leading-none"
              x-text="activeCount(persona.key)"></span>
      </button>
    </template>
  </div>

  <!-- Tab panels -->
  <template x-for="persona in personas" :key="'panel-' + persona.key">
    <div x-show="activeTab === persona.key" x-cloak class="space-y-4">

      <!-- Run control bar -->
      <div class="bg-white rounded-xl border border-slate-100 shadow-sm p-4 flex items-center gap-4 flex-wrap">
        <div class="flex-1 min-w-0">
          <p class="text-sm font-semibold text-slate-800">
            <span x-text="persona.icon + ' ' + persona.label + ' Review'"></span>
          </p>
          <p class="text-xs text-slate-400 mt-0.5">
            <span x-show="!runs[persona.key]">Never run — click Run Review to generate insights</span>
            <span x-show="runs[persona.key]">Last run: <span class="text-slate-600" x-text="fmtDate(runs[persona.key])"></span></span>
          </p>
        </div>
        <div class="flex items-center gap-2 shrink-0">
          <button x-show="insights.some(i => i.agent_type === persona.key)"
                  @click="clearAgent(persona.key)"
                  class="text-xs text-slate-400 hover:text-red-500 px-2 py-1.5 rounded-lg transition-colors">
            Clear All
          </button>
          <button @click="runAgent(persona.key)"
                  :disabled="running[persona.key]"
                  class="flex items-center gap-2 bg-indigo-600 text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors"
                  :class="running[persona.key] ? 'opacity-60 cursor-not-allowed' : 'hover:bg-indigo-700 active:bg-indigo-800'">
            <svg x-show="running[persona.key]" class="animate-spin w-3.5 h-3.5 shrink-0" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
            <svg x-show="!running[persona.key]" class="w-3.5 h-3.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/>
            </svg>
            <span x-text="running[persona.key] ? 'Running…' : 'Run Review'"></span>
          </button>
        </div>
      </div>

      <!-- Error banner -->
      <div x-show="runState[persona.key] === 'error' && runError[persona.key]"
           class="bg-red-50 border border-red-200 rounded-xl px-4 py-3 flex items-start gap-3">
        <svg class="w-4 h-4 text-red-500 mt-0.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
        </svg>
        <div>
          <p class="text-sm font-semibold text-red-700">Last run failed</p>
          <p class="text-xs text-red-600 mt-0.5" x-text="runError[persona.key]"></p>
        </div>
      </div>

      <!-- Status filter chips -->
      <div class="flex gap-1.5 flex-wrap items-center">
        <span class="text-xs text-slate-400 font-medium mr-1">Filter:</span>
        <template x-for="sf in statusFilters" :key="sf.key">
          <button @click="statusFilter = sf.key"
                  :class="statusFilter === sf.key
                    ? 'bg-slate-800 text-white'
                    : 'bg-white text-slate-500 border border-slate-200 hover:bg-slate-50'"
                  class="text-xs font-medium px-3 py-1.5 rounded-lg transition-all">
            <span x-text="sf.label"></span>
            <span x-show="sf.key !== 'all'" class="ml-1 opacity-60"
                  x-text="'(' + countFor(persona.key, sf.key) + ')'"></span>
          </button>
        </template>
      </div>

      <!-- Loading skeleton -->
      <div x-show="loading" class="grid grid-cols-1 lg:grid-cols-2 gap-4">
        <template x-for="n in [1,2,3,4]" :key="n">
          <div class="bg-white rounded-xl border border-slate-100 shadow-sm p-5 animate-pulse space-y-3">
            <div class="flex gap-2">
              <div class="h-5 w-12 bg-slate-200 rounded-full"></div>
              <div class="h-5 w-16 bg-slate-100 rounded-full"></div>
            </div>
            <div class="h-4 bg-slate-200 rounded w-3/4"></div>
            <div class="space-y-1.5">
              <div class="h-3 bg-slate-100 rounded w-full"></div>
              <div class="h-3 bg-slate-100 rounded w-5/6"></div>
            </div>
            <div class="h-12 bg-slate-50 rounded-lg"></div>
          </div>
        </template>
      </div>

      <!-- Empty state -->
      <div x-show="!loading && filteredFor(persona.key).length === 0"
           class="bg-white rounded-xl border border-slate-100 shadow-sm py-16 text-center">
        <p class="text-5xl mb-4" x-text="persona.icon"></p>
        <template x-if="!insights.some(i => i.agent_type === persona.key)">
          <div>
            <p class="text-slate-700 font-medium">No insights yet</p>
            <p class="text-slate-400 text-sm mt-1">Run a review to get expert analysis from the <span x-text="persona.label"></span>.</p>
          </div>
        </template>
        <template x-if="insights.some(i => i.agent_type === persona.key) && statusFilter !== 'all'">
          <div>
            <p class="text-slate-700 font-medium" x-text="'No ' + statusFilter + ' insights'"></p>
            <p class="text-slate-400 text-sm mt-1">Try a different status filter or run another review.</p>
          </div>
        </template>
      </div>

      <!-- Insight cards grid -->
      <div x-show="!loading && filteredFor(persona.key).length > 0"
           class="grid grid-cols-1 lg:grid-cols-2 gap-4">
        <template x-for="ins in filteredFor(persona.key)" :key="ins.id">
          <div class="bg-white rounded-xl border shadow-sm p-5 flex flex-col gap-3 transition-opacity"
               :class="ins.status === 'discarded' ? 'opacity-40 border-slate-100' : 'border-slate-100 hover:shadow-md'">

            <!-- Badges row -->
            <div class="flex items-center gap-2 flex-wrap">
              <span class="text-xs font-bold px-2 py-0.5 rounded-full uppercase tracking-wide leading-none"
                    :class="{
                      'bg-red-100 text-red-700': ins.priority === 'high',
                      'bg-amber-100 text-amber-700': ins.priority === 'medium',
                      'bg-slate-100 text-slate-500': ins.priority === 'low'
                    }"
                    x-text="ins.priority"></span>
              <span class="text-xs font-medium px-2 py-0.5 rounded-full leading-none capitalize"
                    :class="{
                      'bg-purple-100 text-purple-700': ins.category === 'feature',
                      'bg-red-50 text-red-600':        ins.category === 'risk',
                      'bg-orange-100 text-orange-700': ins.category === 'debt',
                      'bg-emerald-100 text-emerald-700': ins.category === 'opportunity',
                      'bg-blue-100 text-blue-700':     ins.category === 'process'
                    }"
                    x-text="ins.category"></span>
              <span x-show="ins.status !== 'active'"
                    class="ml-auto text-xs px-2 py-0.5 rounded-full bg-slate-100 text-slate-500 capitalize"
                    x-text="ins.status"></span>
            </div>

            <!-- Title -->
            <p class="font-semibold text-slate-900 text-sm leading-snug" x-text="ins.title"></p>

            <!-- Description (expandable) -->
            <div x-data="{ expanded: false }">
              <p class="text-sm text-slate-600 leading-relaxed"
                 :class="expanded ? '' : 'line-clamp-3'"
                 x-text="ins.description"></p>
              <button x-show="ins.description && ins.description.length > 160"
                      @click="expanded = !expanded"
                      class="text-xs text-indigo-500 hover:text-indigo-700 mt-1 transition-colors"
                      x-text="expanded ? 'Show less ▲' : 'Show more ▼'"></button>
            </div>

            <!-- Recommendation block -->
            <div class="bg-slate-50 rounded-lg px-3 py-2.5 border border-slate-100 mt-auto">
              <p class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-1">Recommendation</p>
              <p class="text-sm text-slate-700 leading-relaxed" x-text="ins.recommendation"></p>
            </div>

            <!-- Action buttons -->
            <div class="flex gap-1.5 pt-1 flex-wrap" x-show="ins.status !== 'discarded'">
              <button x-show="ins.status !== 'planned'"
                      @click="updateStatus(ins.id, 'planned')"
                      class="flex-1 min-w-[60px] text-xs font-medium px-3 py-1.5 rounded-lg bg-indigo-50 text-indigo-700 hover:bg-indigo-100 transition-colors">
                Plan
              </button>
              <button x-show="ins.status !== 'punted'"
                      @click="updateStatus(ins.id, 'punted')"
                      class="flex-1 min-w-[60px] text-xs font-medium px-3 py-1.5 rounded-lg bg-amber-50 text-amber-700 hover:bg-amber-100 transition-colors">
                Punt
              </button>
              <button x-show="ins.status !== 'active'"
                      @click="updateStatus(ins.id, 'active')"
                      class="text-xs font-medium px-3 py-1.5 rounded-lg bg-slate-100 text-slate-600 hover:bg-slate-200 transition-colors">
                Restore
              </button>
              <button @click="updateStatus(ins.id, 'discarded')"
                      class="text-xs font-medium px-3 py-1.5 rounded-lg bg-red-50 text-red-600 hover:bg-red-100 transition-colors">
                Discard
              </button>
            </div>
            <div class="flex gap-1.5 pt-1" x-show="ins.status === 'discarded'">
              <button @click="updateStatus(ins.id, 'active')"
                      class="flex-1 text-xs font-medium px-3 py-1.5 rounded-lg bg-slate-100 text-slate-600 hover:bg-slate-200 transition-colors">
                Restore
              </button>
            </div>

          </div>
        </template>
      </div>

    </div>
  </template>

</div>
{% endblock %}

{% block scripts %}
<script>
function insightsPage() {
  return {
    activeTab: 'product_manager',
    statusFilter: 'active',
    insights: [],
    runs: { product_manager: null, dev_architect: null, qa_architect: null, ux_architect: null },
    runState: { product_manager: 'idle', dev_architect: 'idle', qa_architect: 'idle', ux_architect: 'idle' },
    runError: { product_manager: null, dev_architect: null, qa_architect: null, ux_architect: null },
    running: { product_manager: false, dev_architect: false, qa_architect: false, ux_architect: false },
    loading: true,

    personas: [
      { key: 'product_manager', label: 'Product Manager', icon: '📋' },
      { key: 'dev_architect',   label: 'Dev Architect',   icon: '🏗️' },
      { key: 'qa_architect',    label: 'QA Architect',    icon: '🔍' },
      { key: 'ux_architect',    label: 'UX Architect',    icon: '🎨' },
    ],

    statusFilters: [
      { key: 'all',       label: 'All' },
      { key: 'active',    label: 'Active' },
      { key: 'planned',   label: 'Planned' },
      { key: 'punted',    label: 'Punted' },
      { key: 'discarded', label: 'Discarded' },
    ],

    async init() {
      await this.fetchAll();
    },

    async fetchAll() {
      try {
        const [ir, rr] = await Promise.all([
          fetch('/api/insights/'),
          fetch('/api/insights/runs'),
        ]);
        const id = await ir.json();
        const rd = await rr.json();
        this.insights = id.insights || [];
        this.runs = { ...this.runs, ...(rd.runs || {}) };
        if (rd.state) {
          for (const [k, v] of Object.entries(rd.state)) {
            this.runState[k] = v.state || 'idle';
            this.runError[k] = v.error || null;
          }
        }
      } catch (e) {
        sfToast('Failed to load insights', 'error');
      }
      this.loading = false;
    },

    activeCount(agentType) {
      return this.insights.filter(i => i.agent_type === agentType && i.status === 'active').length;
    },

    countFor(agentType, status) {
      return this.insights.filter(i =>
        i.agent_type === agentType && (status === 'all' || i.status === status)
      ).length;
    },

    filteredFor(agentType) {
      return this.insights.filter(i =>
        i.agent_type === agentType &&
        (this.statusFilter === 'all' || i.status === this.statusFilter)
      );
    },

    async runAgent(agentType) {
      if (this.running[agentType]) return;
      this.running[agentType] = true;
      const prevRunAt = this.runs[agentType];
      try {
        const res = await fetch(`/api/insights/run/${agentType}`, { method: 'POST' });
        if (!res.ok) throw new Error('Trigger failed');
        this._poll(agentType, prevRunAt, 0);
      } catch (e) {
        sfToast('Failed to trigger review', 'error');
        this.running[agentType] = false;
      }
    },

    async _poll(agentType, prevRunAt, attempts) {
      if (attempts > 40) {
        this.running[agentType] = false;
        sfToast('Review is taking longer than expected — refresh the page to check results', 'warn');
        return;
      }
      await new Promise(r => setTimeout(r, 3000));
      try {
        const rr = await fetch('/api/insights/runs');
        const rd = await rr.json();
        const state = (rd.state || {})[agentType] || {};
        if (state.state === 'error') {
          await this.fetchAll();
          this.running[agentType] = false;
          sfToast('Review failed: ' + (state.error || 'Unknown error'), 'error');
          return;
        }
        const latest = (rd.runs || {})[agentType];
        if (latest && latest !== prevRunAt) {
          await this.fetchAll();
          this.running[agentType] = false;
          sfToast('Review complete — new insights loaded', 'info');
          return;
        }
      } catch (_) {}
      this._poll(agentType, prevRunAt, attempts + 1);
    },

    async updateStatus(insightId, newStatus) {
      const res = await fetch(`/api/insights/${insightId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: newStatus }),
      });
      if (res.ok) {
        const idx = this.insights.findIndex(i => i.id === insightId);
        if (idx >= 0) this.insights[idx].status = newStatus;
      } else {
        sfToast('Failed to update status', 'error');
      }
    },

    async clearAgent(agentType) {
      const label = this.personas.find(p => p.key === agentType)?.label || agentType;
      const ok = await sfConfirm(`Clear all insights from ${label}?`);
      if (!ok) return;
      const res = await fetch(`/api/insights/agent/${agentType}`, { method: 'DELETE' });
      if (res.ok) {
        this.insights = this.insights.filter(i => i.agent_type !== agentType);
        this.runs[agentType] = null;
        sfToast('Insights cleared', 'info');
      } else {
        sfToast('Failed to clear insights', 'error');
      }
    },

    fmtDate(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' })
        + ' at ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    },
  };
}
</script>
{% endblock %}
