{% extends "base.html" %}
{% block title %}Activities{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto space-y-5">

  <div>
    <h1 class="text-2xl font-bold text-slate-900">Activities</h1>
    <p class="text-sm text-slate-500 mt-0.5">Agent run history and event log</p>
  </div>

  <!-- Filters — single hx-get on the form; hx-sync prevents race conditions -->
  <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-4">
    <form id="filter-form"
          hx-get="/ui/activities"
          hx-target="#activities-body"
          hx-trigger="change"
          hx-sync="this:replace"
          hx-include="this"
          hx-indicator="#loading"
          class="flex flex-wrap gap-3 items-end">
      <div class="flex flex-col gap-1">
        <label class="text-xs font-medium text-slate-500 uppercase tracking-wide">Agent</label>
        <select name="agent" class="text-sm border border-slate-200 rounded-lg px-3 py-2 bg-white focus:outline-none focus:ring-2 focus:ring-indigo-300">
          <option value="">All agents</option>
          {% for a in agents %}<option value="{{ a }}" {{ 'selected' if request.query_params.get('agent') == a }}>{{ a | replace('_',' ') | title }}</option>{% endfor %}
        </select>
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-xs font-medium text-slate-500 uppercase tracking-wide">Domain</label>
        <select name="domain" class="text-sm border border-slate-200 rounded-lg px-3 py-2 bg-white focus:outline-none focus:ring-2 focus:ring-indigo-300">
          <option value="">All domains</option>
          {% for d in domains %}<option value="{{ d }}" {{ 'selected' if request.query_params.get('domain') == d }}>{{ d }}</option>{% endfor %}
        </select>
      </div>
      <input type="hidden" name="product" value="{{ request.query_params.get('product', '') }}">
      <div class="flex flex-col gap-1">
        <label class="text-xs font-medium text-slate-500 uppercase tracking-wide">Needs Review</label>
        <select name="requires_human" class="text-sm border border-slate-200 rounded-lg px-3 py-2 bg-white focus:outline-none focus:ring-2 focus:ring-indigo-300">
          <option value="">All</option>
          <option value="true" {{ 'selected' if request.query_params.get('requires_human') == 'true' }}>Yes</option>
          <option value="false" {{ 'selected' if request.query_params.get('requires_human') == 'false' }}>No</option>
        </select>
      </div>
      <div id="loading" class="htmx-indicator flex items-center gap-2 text-sm text-indigo-600 pb-2">
        <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
        </svg>
        Filtering…
      </div>
    </form>
  </div>

  <!-- Table — thead is static; only tbody is swapped by HTMX -->
  <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
    <table class="w-full text-sm">
      <thead>
        <tr class="border-b border-slate-100 bg-slate-50/70">
          <th class="text-left px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wide w-28">Time</th>
          <th class="text-left px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wide w-36">Agent</th>
          <th class="text-left px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wide w-28">Product</th>
          <th class="text-left px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wide w-24">Domain</th>
          <th class="text-left px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wide w-24">Status</th>
          <th class="text-left px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wide">Summary</th>
          <th class="text-left px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wide w-24"></th>
        </tr>
      </thead>
      <tbody id="activities-body" class="divide-y divide-slate-50">
        {% include "partials/activities_rows.html" %}
      </tbody>
    </table>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script>
  // Re-initialise Alpine on every HTMX swap into the activities table
  document.body.addEventListener('htmx:afterSettle', function (evt) {
    if (evt.detail.target && evt.detail.target.id === 'activities-body') {
      Alpine.initTree(evt.detail.target);
    }
  });
</script>
{% endblock %}
