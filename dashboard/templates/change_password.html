{% extends "base.html" %}
{% block title %}Change Password{% endblock %}

{% block content %}
<div class="max-w-md mx-auto space-y-6">

  <div>
    <h1 class="text-2xl font-bold text-slate-900">Change Password</h1>
    <p class="text-sm text-slate-500 mt-0.5">Update your account password</p>
  </div>

  {% if saved %}
  <div class="flex items-center gap-2 bg-emerald-50 border border-emerald-200 text-emerald-700 text-sm rounded-lg px-4 py-3">
    <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
    Password updated successfully.
  </div>
  {% endif %}

  {% if error %}
  <div class="flex items-center gap-2 bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3">
    <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
    {{ error }}
  </div>
  {% endif %}

  <form method="post" action="/profile/password" class="bg-white rounded-xl shadow-sm border border-slate-100 p-6 space-y-4">
    <div class="space-y-1">
      <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide">Current Password</label>
      <input type="password" name="current_password" required autocomplete="current-password"
             class="w-full text-sm border border-slate-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-300 bg-white">
    </div>
    <div class="space-y-1">
      <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide">New Password</label>
      <input type="password" name="new_password" required minlength="8" autocomplete="new-password"
             class="w-full text-sm border border-slate-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-300 bg-white">
      <p class="text-xs text-slate-400">Minimum 8 characters</p>
    </div>
    <button type="submit"
            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium rounded-lg px-4 py-2.5 transition-colors">
      Update Password
    </button>
  </form>

</div>
{% endblock %}
