{% if users %}
<div class="divide-y divide-slate-50">
  {% for u in users %}
  <div class="px-5 py-3 flex items-center gap-3">
    <div class="w-7 h-7 rounded-full bg-indigo-100 flex items-center justify-center shrink-0">
      <span class="text-xs font-semibold text-indigo-600">{{ u.name[0].upper() }}</span>
    </div>
    <div class="flex-1 min-w-0">
      <p class="text-sm font-medium text-slate-700">{{ u.name }}</p>
      <p class="text-xs text-slate-400">{{ u.email or '—' }}</p>
    </div>
    <form hx-post="/ui/config/users/delete" hx-target="#users-list" hx-swap="innerHTML"
          hx-confirm="Remove user '{{ u.name }}'?">
      <input type="hidden" name="name" value="{{ u.name }}">
      <button type="submit" class="text-xs text-red-500 hover:text-red-700 font-medium px-2 py-0.5 rounded hover:bg-red-50 transition-colors">
        Remove
      </button>
    </form>
  </div>
  {% endfor %}
</div>
{% else %}
<div class="px-5 py-8 text-center text-sm text-slate-400">No users defined yet.</div>
{% endif %}
