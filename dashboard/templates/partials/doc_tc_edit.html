<div class="fade-in h-full flex flex-col">

  <!-- Edit header -->
  <div class="pb-4 border-b border-slate-100 flex items-center justify-between shrink-0">
    <div class="flex items-center gap-2">
      <span class="text-xs font-mono font-bold bg-indigo-50 text-indigo-700 border border-indigo-200 px-2.5 py-1 rounded-md">{{ tc_id }}</span>
      <span class="text-sm font-semibold text-slate-600">Editing</span>
    </div>
    <button hx-get="/ui/docs/test-case?product={{ product }}&domain={{ domain }}&feature={{ feature }}&tc_id={{ tc_id }}"
            hx-target="#tc-viewer" hx-swap="innerHTML"
            class="text-xs text-slate-400 hover:text-slate-600 transition-colors">
      Cancel
    </button>
  </div>

  <!-- Edit form -->
  <form hx-post="/ui/docs/test-case/save" hx-target="#tc-viewer" hx-swap="innerHTML"
        class="flex-1 flex flex-col gap-3 pt-4 min-h-0">
    <input type="hidden" name="product" value="{{ product }}">
    <input type="hidden" name="domain" value="{{ domain }}">
    <input type="hidden" name="feature" value="{{ feature }}">
    <input type="hidden" name="tc_id" value="{{ tc_id }}">

    <p class="text-[11px] text-slate-400">Edit the markdown body below. The <code>### {{ tc_id }}</code> header line is preserved automatically.</p>

    <textarea name="body_md"
              class="flex-1 font-mono text-xs border border-slate-200 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-indigo-300 resize-none min-h-0"
              spellcheck="false">{{ body_md }}</textarea>

    <div class="flex items-center gap-2 shrink-0 pb-1">
      <button type="submit"
              class="text-xs font-medium text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg px-4 py-1.5 transition-colors">
        Save
      </button>
      <button type="button"
              hx-get="/ui/docs/test-case?product={{ product }}&domain={{ domain }}&feature={{ feature }}&tc_id={{ tc_id }}"
              hx-target="#tc-viewer" hx-swap="innerHTML"
              class="text-xs text-slate-500 hover:text-slate-700 border border-slate-200 rounded-lg px-3 py-1.5 transition-colors">
        Cancel
      </button>
    </div>
  </form>

</div>
