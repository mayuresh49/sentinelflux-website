<div class="fade-in h-full flex flex-col"
     x-data="tcCreateForm({{ form_data_json }})">

  <!-- Header -->
  <div class="pb-4 border-b border-slate-100 flex items-center justify-between shrink-0">
    <span class="text-sm font-semibold text-slate-700">New Test Case</span>
    <button hx-get="/ui/docs/test-case/placeholder"
            hx-target="#tc-viewer" hx-swap="innerHTML"
            class="text-xs text-slate-400 hover:text-slate-600 transition-colors">
      Cancel
    </button>
  </div>

  <!-- Form -->
  <form hx-post="/ui/docs/test-case/create" hx-target="#tc-viewer" hx-swap="innerHTML"
        class="flex-1 flex flex-col gap-4 pt-4 overflow-auto min-h-0">

    <!-- Hidden computed fields -->
    <input type="hidden" name="tc_id"   :value="computedTcId">
    <input type="hidden" name="feature" :value="featureValue">

    <!-- Row 1: Product · Domain -->
    <div class="grid grid-cols-2 gap-3 shrink-0">
      <div>
        <label class="block text-[11px] font-medium text-slate-500 mb-1">Product *</label>
        <select name="product" x-model="selectedProduct" @change="onProductChange()"
                class="w-full text-xs border border-slate-200 rounded-lg px-2.5 py-1.5 bg-white focus:outline-none focus:ring-2 focus:ring-indigo-200">
          <template x-for="p in products" :key="p">
            <option :value="p" x-text="p"></option>
          </template>
        </select>
      </div>
      <div>
        <label class="block text-[11px] font-medium text-slate-500 mb-1">Domain *</label>
        <select name="domain" x-model="selectedDomain" @change="onDomainChange()"
                class="w-full text-xs border border-slate-200 rounded-lg px-2.5 py-1.5 bg-white focus:outline-none focus:ring-2 focus:ring-indigo-200">
          <option value="web">web</option>
          <option value="api">api</option>
          <option value="mobile">mobile</option>
        </select>
      </div>
    </div>

    <!-- TC ID (auto-generated, read-only display) -->
    <div class="shrink-0">
      <label class="block text-[11px] font-medium text-slate-500 mb-1">TC ID (auto-generated)</label>
      <div class="flex items-center gap-2">
        <span x-text="computedTcId"
              class="inline-block font-mono text-sm font-bold text-indigo-700 bg-indigo-50 border border-indigo-200 px-3 py-1 rounded-md"></span>
        <span class="text-[10px] text-slate-400">Based on the latest ID in this product + domain</span>
      </div>
    </div>

    <!-- Feature / Module -->
    <div class="shrink-0">
      <label class="block text-[11px] font-medium text-slate-500 mb-1">Feature / Module *</label>
      <!-- Existing feature select -->
      <div x-show="featureMode === 'existing'" class="flex items-center gap-2">
        <select @change="onFeatureSelect($event.target.value)"
                class="flex-1 text-xs border border-slate-200 rounded-lg px-2.5 py-1.5 bg-white focus:outline-none focus:ring-2 focus:ring-indigo-200">
          <template x-for="f in availableFeatures" :key="f">
            <option :value="f" :selected="f === selectedFeatureVal"
                    x-text="f.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase())"></option>
          </template>
          <option value="__new__">— Add new module —</option>
        </select>
        <span class="text-[10px] text-indigo-600 font-mono px-2 py-1 bg-indigo-50 rounded"
              x-text="selectedFeatureVal || '—'"></span>
      </div>
      <!-- New feature input -->
      <div x-show="featureMode === 'new'" class="flex items-center gap-2">
        <input type="text" x-model="newFeatureVal" placeholder="e.g. checkout"
               class="flex-1 text-xs border border-slate-200 rounded-lg px-2.5 py-1.5 focus:outline-none focus:ring-2 focus:ring-indigo-200">
        <button type="button" x-show="availableFeatures.length > 0"
                @click="featureMode = 'existing'"
                class="text-xs text-indigo-600 hover:text-indigo-800 border border-indigo-200 rounded-lg px-2.5 py-1.5 whitespace-nowrap">
          ← Use existing
        </button>
      </div>
      <p class="text-[10px] text-slate-400 mt-0.5" x-show="featureMode === 'new'">
        Will create a new .md file for this module
      </p>
    </div>

    <!-- Title -->
    <div class="shrink-0">
      <label class="block text-[11px] font-medium text-slate-500 mb-1">Title / Scenario *</label>
      <input type="text" name="title" required placeholder="Describe what this test case verifies"
             class="w-full text-xs border border-slate-200 rounded-lg px-2.5 py-1.5 focus:outline-none focus:ring-2 focus:ring-indigo-200">
    </div>

    <!-- Heuristic · Test Type · Status -->
    <div class="grid grid-cols-3 gap-3 shrink-0">
      <div>
        <label class="block text-[11px] font-medium text-slate-500 mb-1">Heuristic *</label>
        <select name="heuristic" required
                class="w-full text-xs border border-slate-200 rounded-lg px-2.5 py-1.5 bg-white focus:outline-none focus:ring-2 focus:ring-indigo-200">
          <option value="positive">positive</option>
          <option value="negative">negative</option>
          <option value="edge">edge</option>
          <option value="boundary">boundary</option>
          <option value="security">security</option>
        </select>
      </div>
      <div>
        <label class="block text-[11px] font-medium text-slate-500 mb-1">Test Type</label>
        <select name="test_type"
                class="w-full text-xs border border-slate-200 rounded-lg px-2.5 py-1.5 bg-white focus:outline-none focus:ring-2 focus:ring-indigo-200">
          <option value="">—</option>
          <option value="sanity">sanity</option>
          <option value="regression">regression</option>
          <option value="smoke">smoke</option>
          <option value="security">security</option>
          <option value="performance">performance</option>
        </select>
      </div>
      <div>
        <label class="block text-[11px] font-medium text-slate-500 mb-1">Status *</label>
        <select name="status" required
                class="w-full text-xs border border-slate-200 rounded-lg px-2.5 py-1.5 bg-white focus:outline-none focus:ring-2 focus:ring-indigo-200">
          <option value="not_automated">not automated</option>
          <option value="automated">automated</option>
          <option value="not_automatable">not automatable</option>
        </select>
      </div>
    </div>

    <!-- Script -->
    <div class="shrink-0">
      <label class="block text-[11px] font-medium text-slate-500 mb-1">Script</label>
      <select name="script" x-model="selectedScript"
              class="w-full text-xs border border-slate-200 rounded-lg px-2.5 py-1.5 bg-white focus:outline-none focus:ring-2 focus:ring-indigo-200">
        <option value="">— None (not automated) —</option>
        <template x-for="s in availableScripts" :key="s">
          <option :value="s" x-text="s"></option>
        </template>
      </select>
      <!-- Warning: script already linked to other TCs -->
      <div x-show="scriptWarn" x-cloak
           class="mt-1.5 flex items-start gap-1.5 text-[11px] text-amber-700 bg-amber-50 border border-amber-200 rounded-lg px-2.5 py-1.5">
        <svg class="w-3.5 h-3.5 shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
        </svg>
        <span x-text="scriptWarn"></span>
      </div>
      <!-- No scripts available -->
      <p x-show="availableScripts.length === 0" class="text-[10px] text-slate-400 mt-0.5">
        No test scripts found in <span class="font-mono" x-text="`products/${selectedProduct}/tests/${selectedDomain}/`"></span>
      </p>
    </div>

    <!-- Priority · Owner -->
    <div class="grid grid-cols-2 gap-3 shrink-0">
      <div>
        <label class="block text-[11px] font-medium text-slate-500 mb-1">Priority</label>
        <select name="priority"
                class="w-full text-xs border border-slate-200 rounded-lg px-2.5 py-1.5 bg-white focus:outline-none focus:ring-2 focus:ring-indigo-200">
          <option value="">—</option>
          <option value="High">High</option>
          <option value="Medium">Medium</option>
          <option value="Low">Low</option>
        </select>
      </div>
      <div>
        <label class="block text-[11px] font-medium text-slate-500 mb-1">Owner</label>
        <select name="owner"
                class="w-full text-xs border border-slate-200 rounded-lg px-2.5 py-1.5 bg-white focus:outline-none focus:ring-2 focus:ring-indigo-200">
          <option value="">—</option>
          <template x-for="u in users" :key="u">
            <option :value="u" x-text="u"></option>
          </template>
        </select>
      </div>
    </div>

    <!-- Body markdown -->
    <div class="flex flex-col shrink-0" style="min-height: 180px;">
      <label class="block text-[11px] font-medium text-slate-500 mb-1">Test Case Body (Markdown)</label>
      <p class="text-[10px] text-slate-400 mb-1.5">Priority / Test Type / Owner are written from the fields above — no need to repeat them here.</p>
      <textarea name="body_md"
                class="flex-1 font-mono text-xs border border-slate-200 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-indigo-300 resize-none"
                style="min-height: 160px;"
                spellcheck="false">**Pre-conditions:**
-

**Steps:**
1.

**Expected Result:**
-

**Validation:**
- </textarea>
    </div>

    <!-- Actions -->
    <div class="flex items-center gap-2 shrink-0 pb-2">
      <button type="submit"
              class="text-xs font-medium text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg px-4 py-1.5 transition-colors">
        Save Test Case
      </button>
      <button type="button"
              hx-get="/ui/docs/test-case/placeholder"
              hx-target="#tc-viewer" hx-swap="innerHTML"
              class="text-xs text-slate-500 hover:text-slate-700 border border-slate-200 rounded-lg px-3 py-1.5 transition-colors">
        Cancel
      </button>
    </div>

  </form>
</div>
