{% if custom_fields %}
<div class="divide-y divide-slate-50">
  {% for f in custom_fields %}
  <div class="px-5 py-3 flex items-center gap-3">
    <span class="text-sm font-mono text-slate-700">{{ f.name }}</span>
    <span class="text-xs bg-slate-100 text-slate-500 px-2 py-0.5 rounded font-medium">{{ f.type }}</span>
    <form hx-post="/ui/config/fields/delete" hx-target="#fields-list" hx-swap="innerHTML"
          hx-confirm="Delete field '{{ f.name }}'?" class="ml-auto">
      <input type="hidden" name="name" value="{{ f.name }}">
      <button type="submit" class="text-xs text-red-500 hover:text-red-700 font-medium px-2 py-0.5 rounded hover:bg-red-50 transition-colors">
        Delete
      </button>
    </form>
  </div>
  {% endfor %}
</div>
{% else %}
<div class="px-5 py-8 text-center text-sm text-slate-400">No custom fields defined yet.</div>
{% endif %}
