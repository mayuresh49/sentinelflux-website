<form id="kb-edit-form-{{ filename | replace('.','_') }}" class="h-full flex flex-col fade-in">
  <div class="px-4 py-3 border-b border-slate-100 flex items-center justify-between shrink-0 bg-white">
    <span class="font-mono text-xs text-slate-500">{{ product }}/{{ filename }}</span>
    <div class="flex items-center gap-3">
      <span id="kb-save-status" class="text-xs text-slate-400"></span>
      <button type="button"
              hx-post="/ui/kb/save"
              hx-include="#kb-edit-form-{{ filename | replace('.','_') }}"
              hx-target="#kb-save-status"
              hx-swap="innerHTML"
              class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-medium rounded-lg transition-colors">
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/></svg>
        Save
      </button>
    </div>
  </div>
  <input type="hidden" name="product" value="{{ product }}">
  <input type="hidden" name="filename" value="{{ filename }}">
  <textarea name="content"
            class="flex-1 font-mono text-xs p-4 resize-none focus:outline-none border-0 bg-slate-50 text-slate-800 leading-relaxed">{{ content }}</textarea>
</form>
