name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check .

  package:
    name: Build package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install hatchling build
      - run: python -m build --wheel --no-isolation
      - uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: dist/*.whl

  collect:
    name: Test collection smoke check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: playwright install --with-deps chromium
      - name: Collect orangehrm example tests
        run: python -m pytest --collect-only -q
        working-directory: examples/orangehrm
      - name: Collect restfulbooker example tests
        run: python -m pytest --collect-only -q
        working-directory: examples/restfulbooker
