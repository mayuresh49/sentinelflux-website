name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - "website/**"

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build combined site
        run: |
          mkdir -p _build
          cp -r website/. _build/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_build
          cname: sentinelflux.in
