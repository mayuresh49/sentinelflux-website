[pytest]
minversion = 8.0
addopts = -ra -q --screenshot=on --video=retain-on-failure --tracing=retain-on-failure --html=reports/report.html --self-contained-html -W ignore::urllib3.exceptions.NotOpenSSLWarning
testpaths = tests
python_files = test_*.py
markers =
    api: REST and GraphQL API tests
    web: Web UI tests
    mobile: Mobile automation tests
    security: Security-focused cases
    async_wait: test polls for deferred/scheduled state changes (background jobs, workflows, email)
    integration: test depends on prior test state; requires pytest-depends and ordered execution
filterwarnings =
    ignore::urllib3.exceptions.NotOpenSSLWarning
rp_project = default_personal
rp_endpoint = http://localhost:8080/
rp_api_key =
rp_launch = default_personal
