pages:
  - name: "Login Page"
    url: "/web/index.php/auth/login"
    description: "Application entry point - username/password authentication"
    fields:
      - id: username
        label: "Username"
        type: text_input
        required: true
      - id: password
        label: "Password"
        type: password_input
        required: true
      - id: login_button
        label: "Login"
        type: button
      - id: error_message
        label: "Error message"
        type: text
    test_scenarios:
      positive:
        - "Admin user logs in with valid credentials and lands on dashboard"
        - "ESS user logs in and sees limited navigation menu"
      negative:
        - "Wrong password shows 'Invalid credentials' error"
        - "Empty username shows validation error"
        - "Empty password shows validation error"
        - "Both fields empty shows validation error"
        - "SQL injection in username shows error, not 500"
      edge_cases:
        - "Username is case-sensitive (Admin != admin)"
        - "Browser back button after login does not expose session"
        - "Session expires after inactivity"

  - name: "Dashboard"
    url: "/web/index.php/dashboard/index"
    description: "Main landing page after login with quick launch widgets"
    fields:
      - id: quick_launch_panel
        label: "Quick Launch"
        type: widget
      - id: leave_widget
        label: "My Leave"
        type: widget
      - id: user_dropdown
        label: "User dropdown"
        type: dropdown
      - id: logout_link
        label: "Logout"
        type: link
    test_scenarios:
      positive:
        - "Dashboard loads all widgets after login"
        - "Quick launch shortcuts navigate to correct modules"
        - "Logout redirects to login page and clears session"

  - name: "PIM - Employee List"
    url: "/web/index.php/pim/viewEmployeeList"
    description: "List of all employees with search and filter"
    fields:
      - id: employee_name_filter
        label: "Employee Name"
        type: text_input
      - id: employee_id_filter
        label: "Employee Id"
        type: text_input
      - id: search_button
        label: "Search"
        type: button
      - id: add_employee_button
        label: "Add"
        type: button
      - id: employee_table
        label: "Employee table"
        type: table
      - id: employee_count
        label: "Record count"
        type: text
      - id: delete_checkbox
        label: "Row checkbox"
        type: checkbox
    test_scenarios:
      positive:
        - "Employee list loads with all employees on page load"
        - "Search by employee name filters results correctly"
        - "Search by employee ID filters to exact match"
        - "Clicking Add navigates to add employee form"
        - "Record count updates after search"
      negative:
        - "Search with non-existent name shows 'No Records Found'"
        - "Search with special characters handles gracefully"
      edge_cases:
        - "Search is case-insensitive"
        - "Partial name search returns all matching employees"

  - name: "PIM - Add Employee"
    url: "/web/index.php/pim/addEmployee"
    description: "Form to create a new employee record"
    fields:
      - id: firstname
        label: "First Name"
        type: text_input
        required: true
        max_length: 30
      - id: middlename
        label: "Middle Name"
        type: text_input
        required: false
        max_length: 30
      - id: lastname
        label: "Last Name"
        type: text_input
        required: true
        max_length: 30
      - id: employee_id
        label: "Employee Id"
        type: text_input
        required: false
      - id: create_login_toggle
        label: "Create Login Details"
        type: toggle
      - id: save_button
        label: "Save"
        type: button
      - id: cancel_button
        label: "Cancel"
        type: button
    test_scenarios:
      positive:
        - "Save with first name and last name creates employee and redirects to profile"
        - "Save with all fields populates employee record correctly"
        - "Enable Create Login Details shows username/password fields"
        - "Cancel navigates back to employee list without saving"
        - "Auto-generated employee ID is unique"
      negative:
        - "Save without first name shows required field error"
        - "Save without last name shows required field error"
        - "First name exceeding 30 characters shows validation error"
        - "Duplicate employee ID shows error"
      edge_cases:
        - "First name with only spaces shows validation error"
        - "Employee ID with special characters is rejected"
        - "First name with accented characters is accepted"

  - name: "Leave - Leave List"
    url: "/web/index.php/leave/viewLeaveList"
    description: "List of leave requests with filters and approval actions"
    fields:
      - id: from_date_filter
        label: "Date From"
        type: date_input
      - id: to_date_filter
        label: "Date To"
        type: date_input
      - id: leave_status_filter
        label: "Show"
        type: dropdown
      - id: search_button
        label: "Search"
        type: button
      - id: leave_table
        label: "Leave request table"
        type: table
    test_scenarios:
      positive:
        - "Leave list loads with current period leave requests"
        - "Filter by date range narrows results correctly"
        - "Admin can approve a pending leave request"
        - "Admin can reject a pending leave request"
      negative:
        - "Date To before Date From shows validation or empty results"

  - name: "Admin - System Users"
    url: "/web/index.php/admin/viewSystemUsers"
    description: "Manage system user accounts — list, search, create, delete"
    fields:
      - id: username_filter
        label: "Username"
        type: text_input
      - id: user_role_filter
        label: "User Role"
        type: dropdown
        options: ["Admin", "ESS"]
      - id: employee_name_filter
        label: "Employee Name"
        type: autocomplete
      - id: status_filter
        label: "Status"
        type: dropdown
        options: ["Enabled", "Disabled"]
      - id: search_button
        label: "Search"
        type: button
      - id: add_button
        label: "Add"
        type: button
      - id: users_table
        label: "System users table"
        type: table
      - id: record_count
        label: "Record count"
        type: text
    add_form_fields:
      - id: user_role
        label: "User Role"
        type: dropdown
        required: true
        options: ["Admin", "ESS"]
      - id: employee_name
        label: "Employee Name"
        type: autocomplete
        required: true
      - id: status
        label: "Status"
        type: dropdown
        required: true
        options: ["Enabled", "Disabled"]
      - id: username
        label: "Username"
        type: text_input
        required: true
        unique: true
      - id: password
        label: "Password"
        type: password_input
        required: true
        rules: ["min 8 chars", "uppercase", "number", "special char"]
      - id: confirm_password
        label: "Confirm Password"
        type: password_input
        required: true
    test_scenarios:
      positive:
        - "System users list loads with record count on navigation"
        - "Search by username 'Admin' returns at least one result"
        - "Cancel on add-user form returns to users list without saving"
      negative:
        - "Search with non-existent username shows No Records Found"
        - "Save add-user form without username shows required field error"
        - "Save add-user form without password shows required field error"

  - name: "Recruitment - Job Vacancies"
    url: "/web/index.php/recruitment/viewJobVacancy"
    description: "List of job vacancies with search filters and add/edit actions"
    fields:
      - id: job_title_filter
        label: "Job Title"
        type: dropdown
        required: false
      - id: vacancy_filter
        label: "Vacancy"
        type: text_input
        required: false
      - id: hiring_manager_filter
        label: "Hiring Manager"
        type: autocomplete
        required: false
      - id: status_filter
        label: "Status"
        type: dropdown
        options: ["Active", "Inactive"]
        required: false
      - id: search_button
        label: "Search"
        type: button
      - id: add_button
        label: "Add"
        type: button
      - id: vacancies_table
        label: "Vacancies table"
        type: table
    test_scenarios:
      positive:
        - "Vacancies list loads with all active vacancies on navigation"
        - "Filter by job title narrows vacancy list"
        - "Filter by status Active shows only active vacancies"
        - "Clicking Add navigates to add vacancy form"
      negative:
        - "Filter with no matching criteria shows No Records Found"

  - name: "Recruitment - Add Vacancy"
    url: "/web/index.php/recruitment/addJobVacancy"
    description: "Form to create a new job vacancy"
    fields:
      - id: vacancy_name
        label: "Vacancy Name"
        type: text_input
        required: true
        max_length: 100
      - id: job_title
        label: "Job Title"
        type: dropdown
        required: true
        note: "Must be an existing job title configured in Admin"
      - id: hiring_manager
        label: "Hiring Manager"
        type: autocomplete
        required: true
        note: "Must be an existing active employee"
      - id: num_of_positions
        label: "No. of Positions"
        type: number_input
        required: false
        note: "Positive integer only"
      - id: description
        label: "Description"
        type: textarea
        required: false
      - id: status
        label: "Status"
        type: dropdown
        required: true
        options: ["Active", "Inactive"]
      - id: save_button
        label: "Save"
        type: button
      - id: cancel_button
        label: "Cancel"
        type: button
    test_scenarios:
      positive:
        - "Save vacancy with required fields only (Name, Job Title, Hiring Manager, Status) creates vacancy"
        - "Save vacancy with all fields creates complete vacancy record"
        - "Cancel returns to vacancies list without saving"
      negative:
        - "Save without Vacancy Name shows required field error"
        - "Save without Job Title shows required field error"
        - "Save without Hiring Manager shows required field error"
        - "Vacancy Name exceeding 100 characters shows validation error"
        - "No. of Positions with 0 or negative value shows validation error"

  - name: "Recruitment - Candidates"
    url: "/web/index.php/recruitment/viewCandidates"
    description: "List of job applicants/candidates with filters"
    fields:
      - id: candidate_name_filter
        label: "Candidate Name"
        type: text_input
        required: false
      - id: vacancy_filter
        label: "Vacancy"
        type: dropdown
        required: false
      - id: hiring_manager_filter
        label: "Hiring Manager"
        type: autocomplete
        required: false
      - id: status_filter
        label: "Status"
        type: dropdown
        options: ["Application Initiated", "Shortlisted", "Interview Scheduled", "Interview Passed", "Interview Failed", "Job Offered", "Offer Declined", "Hired", "Rejected"]
        required: false
      - id: keywords_filter
        label: "Keywords"
        type: text_input
        required: false
      - id: from_date_filter
        label: "Date of Application (From)"
        type: date_input
        required: false
      - id: to_date_filter
        label: "Date of Application (To)"
        type: date_input
        required: false
      - id: search_button
        label: "Search"
        type: button
      - id: add_button
        label: "Add"
        type: button
      - id: candidates_table
        label: "Candidates table"
        type: table

  - name: "Recruitment - Add Candidate"
    url: "/web/index.php/recruitment/addCandidate"
    description: "Form to manually add a job candidate"
    fields:
      - id: first_name
        label: "First Name"
        type: text_input
        required: true
        max_length: 30
      - id: middle_name
        label: "Middle Name"
        type: text_input
        required: false
        max_length: 30
      - id: last_name
        label: "Last Name"
        type: text_input
        required: true
        max_length: 30
      - id: email
        label: "Email"
        type: email_input
        required: true
        note: "Must be valid email format"
      - id: contact_number
        label: "Contact Number"
        type: text_input
        required: false
        max_length: 25
      - id: vacancy
        label: "Vacancy"
        type: dropdown
        required: false
        note: "Links candidate to a specific job vacancy"
      - id: resume
        label: "Resume"
        type: file_upload
        required: false
        allowed_types: ["PDF", "DOC", "DOCX"]
        max_size_mb: 2
      - id: application_date
        label: "Date of Application"
        type: date_input
        required: true
        note: "Defaults to today's date"
      - id: consent_to_keep_data
        label: "Consent to keep data"
        type: checkbox
        required: false
      - id: keywords
        label: "Keywords"
        type: text_input
        required: false
      - id: notes
        label: "Notes"
        type: textarea
        required: false
      - id: save_button
        label: "Save"
        type: button
      - id: cancel_button
        label: "Cancel"
        type: button
    test_scenarios:
      positive:
        - "Save candidate with required fields only (First Name, Last Name, Email, Date of Application) creates candidate"
        - "Save candidate with all fields creates complete candidate record"
        - "Candidate appears in candidates list after saving"
        - "Cancel returns to candidates list without saving"
      negative:
        - "Save without First Name shows required field error"
        - "Save without Last Name shows required field error"
        - "Save without Email shows required field error"
        - "Save with invalid email format shows validation error"
        - "Resume upload with unsupported file type is rejected"
        - "Resume upload exceeding 2MB is rejected"

  - name: "Recruitment - Schedule Interview"
    url: "/web/index.php/recruitment/interviewSchedule"
    description: "Schedule a job interview for a candidate"
    fields:
      - id: interview_title
        label: "Interview Title"
        type: text_input
        required: true
        max_length: 100
      - id: interviewers
        label: "Interviewers"
        type: multi_select_autocomplete
        required: true
        note: "One or more active employees"
      - id: interview_date
        label: "Interview Date"
        type: date_input
        required: true
      - id: interview_time
        label: "Interview Time"
        type: time_input
        required: false
      - id: duration_hours
        label: "Duration (Hours)"
        type: number_input
        required: false
      - id: duration_minutes
        label: "Duration (Minutes)"
        type: number_input
        required: false
      - id: location
        label: "Location"
        type: text_input
        required: false
        max_length: 100
      - id: notes
        label: "Notes"
        type: textarea
        required: false
      - id: save_button
        label: "Save"
        type: button
    test_scenarios:
      positive:
        - "Save interview with required fields (Title, Interviewer, Date) creates schedule"
        - "Scheduled interview appears in candidate's activity history"
      negative:
        - "Save without Interview Title shows required field error"
        - "Save without at least one Interviewer shows required field error"
        - "Save without Interview Date shows required field error"
        - "Interview date in the past shows validation warning"
      edge_cases:
        - "Multiple interviewers can be assigned to one interview"
        - "Interview scheduled on a non-working day shows a warning"

  - name: "Timesheets"
    url: "/web/index.php/time/viewEmployeeTimesheet"
    description: "Timesheets and attendance tracking — create, submit, approve/reject weekly timesheets"
    fields:
      - id: employee_id
        label: "Employee ID"
        type: text_input
        required: true
        note: "Must reference an existing employee; unique per timesheet period"
      - id: timesheet_from_date
        label: "From Date"
        type: date_input
        required: true
        validation: "YYYY-MM-DD; cannot be empty"
      - id: timesheet_to_date
        label: "To Date"
        type: date_input
        required: true
        validation: "YYYY-MM-DD; must be >= from_date"
      - id: hours_worked
        label: "Hours Worked"
        type: number_input
        required: true
        validation: "Positive integer; maximum reasonable value enforced (e.g. >168 per week is invalid)"
      - id: submit_button
        label: "Submit"
        type: button
    test_scenarios:
      positive:
        - "Authenticated user can access Timesheets form"
        - "Valid submission with employee_id, from_date, to_date, hours_worked succeeds"
        - "Supervisor can view and approve direct reports' submitted timesheets"
      negative:
        - "Missing Employee ID shows required field validation error"
        - "Missing Hours Worked shows required field validation error"
        - "Empty From Date shows validation error"
        - "Hours worked value exceeding maximum (e.g. 999) shows invalid input error"
        - "Duplicate submission for same employee and period shows conflict error"
      edge_cases:
        - "Session expiry during timesheet editing requires re-login"
        - "ESS user can only view and edit their own timesheet (not others')"
