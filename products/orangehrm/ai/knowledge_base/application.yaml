application:
  name: "OrangeHRM"
  description: "Open Source Human Resource Management System"
  version: "5.x"
  type: "web_application"

environments:
  demo:
    base_url: "https://opensource-demo.orangehrmlive.com"
    login_url: "https://opensource-demo.orangehrmlive.com/web/index.php/auth/login"
    api_base_url: "https://opensource-demo.orangehrmlive.com/web/index.php/api/v2"
  local:
    base_url: "http://localhost:80"
    login_url: "http://localhost:80/web/index.php/auth/login"
    api_base_url: "http://localhost:80/web/index.php/api/v2"

default_credentials:
  admin:
    username: "Admin"
    password: "admin123"
  ess_user:
    username: "Kris.Chapman"
    password: "Admin123"

modules:
  - name: Admin
    path: /web/index.php/admin/viewSystemUsers
    description: System user management, job titles, pay grades, organizational structure
  - name: PIM
    path: /web/index.php/pim/viewEmployeeList
    description: Personnel Information Management - employee records CRUD
  - name: Leave
    path: /web/index.php/leave/viewLeaveList
    description: Leave management - types, entitlements, requests, approval
  - name: Time
    path: /web/index.php/time/viewEmployeeTimesheet
    description: Timesheets and attendance tracking
  - name: Recruitment
    path: /web/index.php/recruitment/viewJobVacancy
    description: Job vacancies, candidates, interview scheduling
  - name: Performance
    path: /web/index.php/performance/searchPerformanceReview
    description: KPIs and performance reviews
  - name: Dashboard
    path: /web/index.php/dashboard/index
    description: Quick launch panel and summary widgets
  - name: Directory
    path: /web/index.php/directory/viewDirectory
    description: Employee directory with search
  - name: Maintenance
    path: /web/index.php/maintenance/viewPurgeEmployee
    description: Data purge, backups, access audit
  - name: My Info
    path: /web/index.php/pim/viewMyDetails
    description: Self-service profile management for ESS users

test_data:
  employees:
    valid_minimal:
      first_name: "Test"
      last_name: "Employee"
      employee_id: "auto-generated"
    valid_complete:
      first_name: "John"
      middle_name: "Robert"
      last_name: "Doe"
      employee_id: "EMP-9999"
      username: "john.doe"
      password: "John@1234"
      status: "Enabled"
  leave_types:
    - "Annual Leave"
    - "Sick Leave"
    - "Casual Leave"
    - "Maternity Leave"
