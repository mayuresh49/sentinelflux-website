mobile_app:
  name: "Restful Booker Mobile"
  platform_versions:
    android: "10+"
    ios: "15+"
  app_package: "com.example.booking"
  app_activity: ".MainActivity"
  bundle_id: "com.example.booking"

screens:
  - name: "Home / Booking List"
    description: "Displays list of existing bookings"
    elements:
      - id: booking_list
        description: "Scrollable list of bookings"
      - id: add_booking_button
        description: "FAB to navigate to create booking screen"
    actions:
      - "Scroll booking list"
      - "Tap booking item to view details"
      - "Tap FAB to create new booking"
    test_scenarios:
      positive:
        - "Booking list loads on app launch"
        - "Tapping a booking item opens detail screen"
        - "FAB navigates to create booking screen"
      negative:
        - "Empty state shown when no bookings exist"

  - name: "Create Booking"
    description: "Form to create a new hotel room booking"
    elements:
      - id: firstname_field
        label: "First Name"
        required: true
        type: text_input
        validation: "1-100 chars, alphanumeric and spaces only"
      - id: lastname_field
        label: "Last Name"
        required: true
        type: text_input
        validation: "1-100 chars"
      - id: total_price_field
        label: "Total Price"
        required: true
        type: numeric_input
        validation: "positive number"
      - id: checkin_field
        label: "Check-in Date"
        required: true
        type: date_picker
        format: "YYYY-MM-DD"
      - id: checkout_field
        label: "Check-out Date"
        required: true
        type: date_picker
        format: "YYYY-MM-DD"
        validation: "must be after checkin"
      - id: deposit_paid_toggle
        label: "Deposit Paid"
        required: false
        type: toggle
      - id: submit_button
        label: "Submit Booking"
        type: button
    actions:
      - "Fill firstname"
      - "Fill lastname"
      - "Enter total price"
      - "Select checkin date"
      - "Select checkout date"
      - "Toggle deposit paid"
      - "Tap Submit"
    test_scenarios:
      positive:
        - "Submit valid booking shows confirmation message"
        - "Submit with deposit paid toggled shows confirmed booking with deposit flag"
        - "Booking with minimum required fields only submits successfully"
      negative:
        - "Submit without firstname shows error"
        - "Submit without lastname shows error"
        - "Submit with checkout before checkin shows date validation error"
        - "Submit with zero total price shows validation error"
        - "Submit with past checkin date shows error"
      edge_cases:
        - "Max length firstname (100 chars) is accepted"
        - "Total price at upper boundary (999999) is accepted"
        - "Same checkin and checkout date shows error (must be at least 1 night)"
        - "Checkin on leap day (Feb 29) is handled correctly"

  - name: "Booking Detail"
    description: "Read-only view of a booking's details"
    elements:
      - id: booking_firstname
        label: "First Name"
      - id: booking_lastname
        label: "Last Name"
      - id: booking_price
        label: "Total Price"
      - id: booking_checkin
        label: "Check-in"
      - id: booking_checkout
        label: "Check-out"
      - id: deposit_status
        label: "Deposit Paid"
    test_scenarios:
      positive:
        - "All booking fields displayed correctly"
        - "Deposit paid status shows correct value"

gestures:
  - name: swipe_up
    description: "Scroll down in a list or form"
    use_for: "Reach elements below the fold"
  - name: swipe_down
    description: "Scroll up / pull to refresh"
  - name: tap
    description: "Standard element tap"
  - name: long_press
    description: "Context menu / delete action"

platform_differences:
  locator_strategy:
    android: "Prefer resource-id or content-desc; XPATH as fallback"
    ios: "Prefer accessibility_id; XCUIElement XPath as fallback"
  date_picker:
    android: "Native DatePickerDialog — send YYYY-MM-DD as text to the field"
    ios: "Wheel picker — requires swipe gestures or direct text input depending on iOS version"
  keyboard:
    android: "Use send_keys(); hide with driver.hide_keyboard()"
    ios: "Use send_keys(); tap Done/Return to dismiss"

test_data:
  valid_bookings:
    - firstname: "John"
      lastname: "Doe"
      total_price: 150.0
      checkin: "2026-06-01"
      checkout: "2026-06-05"
      deposit_paid: true
    - firstname: "Alice"
      lastname: "Smith"
      total_price: 200.0
      checkin: "2026-07-01"
      checkout: "2026-07-03"
      deposit_paid: false
  invalid_bookings:
    - case: "Missing firstname"
      firstname: ""
      lastname: "Doe"
      total_price: 100.0
      checkin: "2026-06-01"
      checkout: "2026-06-05"
    - case: "Checkout before checkin"
      firstname: "John"
      lastname: "Doe"
      total_price: 100.0
      checkin: "2026-06-10"
      checkout: "2026-06-05"
