pages:
  - name: "Home Page"
    url: "https://automationintesting.online"
    description: "Public landing page listing available hotel rooms"
    elements:
      - "Room listing cards (.hotel-room-info)"
      - "Book this room button per room"
      - "Room description and image"
    test_scenarios:
      positive:
        - "Rooms are displayed on page load"
        - "Each room has a Book button"
        - "Room count is at least 1"
      negative:
        - "No rooms shown when all are unavailable"

  - name: "Booking Form"
    url: "https://automationintesting.online (inline on home page)"
    description: "Inline booking form that appears after clicking 'Book this room'"
    elements:
      - "Firstname input (input[name='firstname'])"
      - "Lastname input (input[name='lastname'])"
      - "Email input (input[name='email'])"
      - "Phone input (input[name='phone'])"
      - "Date range picker"
      - "Book button"
    test_scenarios:
      positive:
        - "Submit with all valid fields shows confirmation"
        - "Phone with 11+ digits accepted"
        - "Email with valid format accepted"
      negative:
        - "Submit with no fields shows validation errors"
        - "Submit with invalid email shows error"
        - "Submit with short phone number shows error"
        - "Submit without selecting dates shows error"

  - name: "Admin Panel"
    url: "https://automationintesting.online/#/admin"
    description: "Admin login and management area"
    elements:
      - "Username input (input[data-testid='username'])"
      - "Password input (input[data-testid='password'])"
      - "Login/Submit button (button[data-testid='submit'])"
      - "Rooms menu link"
      - "Report menu link"
      - "Branding menu link"
      - "Logout link"
    test_scenarios:
      positive:
        - "Valid credentials (admin/password) log in successfully"
        - "Admin panel shows Rooms, Report, Branding menus"
        - "Logout returns to login screen"
      negative:
        - "Invalid credentials show error or stay on login"
        - "Empty credentials rejected"
