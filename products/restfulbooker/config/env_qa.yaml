restfulbooker:
  api_base_url: "https://restful-booker.herokuapp.com"
  web_base_url: "https://automationintesting.online"
  credentials:
    username: "admin"
    password: "password123"   # API auth endpoint
  web_credentials:
    username: "admin"
    password: "password"      # Web admin UI login

browser:
  timeout: 15000

mobile:
  appium_url: "http://localhost:4723"
  platform: "android"
  capabilities:
    platformName: "Android"
    deviceName: "emulator-5554"
    automationName: "UiAutomator2"
    appPackage: "com.example.booking"
    appActivity: ".MainActivity"
    noReset: true
    newCommandTimeout: 60

logging:
  level: "INFO"
  file: "logs/sentinelflux.log"

sentinelflux:
  ai:
    enabled: false
    mode: mistral
    self_healing: false
    api_key: ""
